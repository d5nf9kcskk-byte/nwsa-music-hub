<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NWSA Music Hub</title>

    <!-- PWA / iOS home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Director" />
    <meta name="theme-color" content="#0d7e8e" />

    <link rel="manifest" href="/ggmuze/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/ggmuze/favicon.svg" />
    <link rel="apple-touch-icon" href="/ggmuze/icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA fix: restore the URL saved by 404.html on refresh/direct link -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          if (redirect !== location.href) {
            history.replaceState(null, null, redirect);
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
