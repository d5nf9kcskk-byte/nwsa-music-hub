name: Deploy Firestore & Storage rules

# Deploys the security rules automatically whenever they change on main, using
# the same service account the other admin tasks use. This closes the last
# manual step: editing firestore.rules / storage.rules no longer needs a
# hand-run `firebase deploy` — the rules go live with the change that made them.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-rules.yml'

# Never let two rule deploys race.
concurrency:
  group: deploy-rules
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # firebase-tools authenticates via a service-account key file pointed to
      # by GOOGLE_APPLICATION_CREDENTIALS. Write the secret JSON to a temp file.
      - name: Write service-account key
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON secret is not set — aborting." >&2
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy rules
        run: |
          npx --yes firebase-tools@13 deploy \
            --only firestore:rules,storage:rules \
            --project nwsa-hub \
            --non-interactive

      - name: Clean up credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/sa.json"
