name: Enrich Repertoire with AI

on:
  # Run automatically after each deploy (so new pending pieces get enriched quickly).
  workflow_run:
    workflows: [Deploy to GitHub Pages]
    types: [completed]
  # Also allow manual trigger from the Actions tab.
  workflow_dispatch:
    inputs:
      max_pieces:
        description: Max pieces to enrich per run
        default: '20'
        required: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    # Skip if the deploy workflow failed — data may be stale.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - name: Enrich pending repertoire pieces
        run: node scripts/enrich-repertoire.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          ENRICH_MAX: ${{ github.event.inputs.max_pieces || '20' }}
